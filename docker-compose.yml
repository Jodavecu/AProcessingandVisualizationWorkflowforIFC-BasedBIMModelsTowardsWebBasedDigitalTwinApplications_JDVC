version: '3.8'

services:
  ifc-viewer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ifc-viewer-app
    ports:
      - "8080:80" # Mapea el puerto 8080 de tu PC al 80 del contenedor Nginx
    restart: unless-stopped
